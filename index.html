<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    overflow: hidden;
    text-align: center;
}

/* intro */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

h1 {
    opacity: 0;
    animation: fadeIn 3s forwards;
}

button {
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(90deg, #ff9ebc, #ffc0cb);
    color: white;
    cursor: pointer;
    box-shadow: 0 0 15px pink;
}

.scene { display: none; }

.title {
    position: absolute;
    top: 8%;
    width: 100%;
    font-size: 22px;
    letter-spacing: 2px;
}

.flower {
    position: absolute;
    bottom: 0;
    width: 100%;
}

svg {
    width: 100%;
    height: auto;
}

/* rumput */
.grass {
    transform-origin: bottom;
    transform: scaleY(0);
    animation: growGrass 1s ease forwards;
}

@keyframes growGrass {
    to { transform: scaleY(1); }
}

/* batang */
.stem {
    transform-origin: bottom;
    transform: scaleY(0);
    animation: growStem 1s ease forwards;
}

/* daun */
.leaf {
    opacity: 0;
    transform: scale(0.5);
    animation: growLeaf 0.8s ease forwards;
}

/* bunga */
.bloom path {
    transform-origin: 50% 100%;
    transform: scaleY(0);
    animation: bloom 0.8s ease forwards;
}

/* delay */
.plant > g:nth-child(1) .stem { animation-delay: 0.3s; }
.plant > g:nth-child(1) .leaf { animation-delay: 0.9s; }
.plant > g:nth-child(1) .bloom path { animation-delay: 1.5s; }

.plant > g:nth-child(2) .stem { animation-delay: 0.6s; }
.plant > g:nth-child(2) .leaf { animation-delay: 1.2s; }
.plant > g:nth-child(2) .bloom path { animation-delay: 1.8s; }

.plant > g:nth-child(3) .stem { animation-delay: 0.9s; }
.plant > g:nth-child(3) .leaf { animation-delay: 1.5s; }
.plant > g:nth-child(3) .bloom path { animation-delay: 2.1s; }

@keyframes growStem { to { transform: scaleY(1); } }
@keyframes growLeaf { to { opacity: 1; transform: scale(1); } }
@keyframes bloom { to { transform: scaleY(1); opacity: 1; } }

/* goyang */
.plant {
    animation: sway 5s ease-in-out infinite;
    transform-origin: bottom center;
}

@keyframes sway {
    0% { transform: rotate(-1deg); }
    50% { transform: rotate(1deg); }
    100% { transform: rotate(-1deg); }
}

/* bintang */
.stars circle {
    fill: white;
    opacity: 0;
    animation: twinkle 2s infinite;
}

.stars circle:nth-child(1){ animation-delay: 0s; }
.stars circle:nth-child(2){ animation-delay: 0.5s; }
.stars circle:nth-child(3){ animation-delay: 1s; }
.stars circle:nth-child(4){ animation-delay: 1.5s; }
.stars circle:nth-child(5){ animation-delay: 0.8s; }
.stars circle:nth-child(6){ animation-delay: 1.2s; }
.stars circle:nth-child(7){ animation-delay: 0.3s; }

@keyframes twinkle {
    0% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.2); }
    100% { opacity: 0; transform: scale(0.5); }
}

/* hearts */
.heart {
    position: absolute;
    color: pink;
    animation: floatHeart linear forwards;
    opacity: 0;
}

@keyframes floatHeart {
    0% { transform: translateY(0); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: translateY(-250px); opacity: 0; }
}

@keyframes fadeIn {
    to { opacity: 1; }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="bgm" autoplay loop playsinline>
<source src="https://media1.vocaroo.com/mp3/18KsYbQR9IhO" type="audio/mpeg">
</audio>

<div class="container" id="start">
<h1>THIS IS FOR MY ONE AND MY ONLY LOVE</h1>
<button onclick="startLove()">CLICK</button>
</div>

<div class="scene" id="scene">
<div class="title">I LOVE U WITH ALL OF MY HEART</div>

<div class="flower">
<svg viewBox="0 0 320 350">

<defs>

<!-- glow -->
<radialGradient id="bgGlow" cx="50%" cy="70%" r="60%">
<stop offset="0%" stop-color="#ffb6c1" stop-opacity="0.6"/>
<stop offset="40%" stop-color="#ff69b4" stop-opacity="0.3"/>
<stop offset="100%" stop-color="black" stop-opacity="0"/>
</radialGradient>

<!-- rumput -->
<linearGradient id="grassBack" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#66bb6a"/>
<stop offset="100%" stop-color="#1b5e20"/>
</linearGradient>

<linearGradient id="grassFront" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#81c784"/>
<stop offset="100%" stop-color="#2e7d32"/>
</linearGradient>

<!-- daun -->
<linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#8be28b"/>
<stop offset="100%" stop-color="#2e7d32"/>
</linearGradient>

<!-- bunga -->
<linearGradient id="pinkTulip" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#ffc0cb"/>
<stop offset="100%" stop-color="#ff4d6d"/>
</linearGradient>

<linearGradient id="whiteTulip" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#ffffff"/>
<stop offset="100%" stop-color="#ffd6e0"/>
</linearGradient>

</defs>

<!-- glow background -->
<rect x="0" y="0" width="320" height="350" fill="url(#bgGlow)"/>

<!-- ✨ bintang -->
<g class="stars">
<circle cx="40" cy="60" r="1.5"/>
<circle cx="100" cy="40" r="1"/>
<circle cx="200" cy="70" r="1.3"/>
<circle cx="280" cy="50" r="1.2"/>
<circle cx="150" cy="30" r="1.5"/>
<circle cx="220" cy="20" r="1"/>
<circle cx="60" cy="90" r="1.2"/>
</g>

<!-- 🌱 rumput -->
<g class="grass">
<path d="M0 300 Q10 250 20 300 Q30 240 40 300 Q50 250 60 300 Q70 230 80 300 Q90 250 100 300 Q110 240 120 300 Q130 250 140 300 Q150 230 160 300 Q170 250 180 300 Q190 240 200 300 Q210 250 220 300 Q230 230 240 300 Q250 250 260 300 Q270 240 280 300 Q290 250 300 300 Q310 240 320 300 L320 350 L0 350 Z"
fill="url(#grassBack)"/>

<path d="M0 310 Q10 270 20 310 Q30 260 40 310 Q50 270 60 310 Q70 250 80 310 Q90 270 100 310 Q110 260 120 310 Q130 270 140 310 Q150 250 160 310 Q170 270 180 310 Q190 260 200 310 Q210 270 220 310 Q230 250 240 310 Q250 270 260 310 Q270 260 280 310 Q290 270 300 310 Q310 260 320 310 L320 350 L0 350 Z"
fill="url(#grassFront)"/>
</g>

<!-- bunga -->
<g class="plant">

<g transform="translate(60,0)">
<rect class="stem" x="48" y="170" width="6" height="130" fill="url(#leafGrad)"/>
<path class="leaf" d="M50 230 C10 210, 20 290, 50 270" fill="url(#leafGrad)"/>
<path class="leaf" d="M50 250 C80 220, 90 310, 50 290" fill="url(#leafGrad)"/>
<g class="bloom">
<path d="M50 90 C30 120, 35 160, 50 170 C65 160,70 120,50 90" fill="url(#pinkTulip)"/>
<path d="M50 90 C10 130, 20 170, 50 170" fill="#ffb6c1"/>
<path d="M50 90 C90 130, 80 170, 50 170" fill="#ff8fab"/>
</g>
</g>

<g transform="translate(140,0)">
<rect class="stem" x="48" y="160" width="6" height="140" fill="url(#leafGrad)"/>
<path class="leaf" d="M50 240 C10 210, 20 310, 50 290" fill="url(#leafGrad)"/>
<path class="leaf" d="M50 260 C80 230, 90 330, 50 310" fill="url(#leafGrad)"/>
<g class="bloom">
<path d="M50 80 C30 110, 35 160, 50 170 C65 160,70 110,50 80" fill="url(#whiteTulip)"/>
<path d="M50 80 C10 130, 20 170, 50 170" fill="#ffe4ec"/>
<path d="M50 80 C90 130, 80 170, 50 170" fill="#ffc0cb"/>
</g>
</g>

<g transform="translate(220,0)">
<rect class="stem" x="48" y="170" width="6" height="130" fill="url(#leafGrad)"/>
<path class="leaf" d="M50 230 C10 210, 20 290, 50 270" fill="url(#leafGrad)"/>
<path class="leaf" d="M50 250 C80 220, 90 310, 50 290" fill="url(#leafGrad)"/>
<g class="bloom">
<path d="M50 90 C30 120, 35 160, 50 170 C65 160,70 120,50 90" fill="url(#pinkTulip)"/>
<path d="M50 90 C10 130, 20 170, 50 170" fill="#ffb6c1"/>
<path d="M50 90 C90 130, 80 170, 50 170" fill="#ff8fab"/>
</g>
</g>

</g>
</svg>
</div>
</div>

<script>
const music = document.getElementById("bgm");

window.addEventListener("load", () => {
    music.play().catch(() => {});
});

document.addEventListener("click", () => {
    music.play();
}, { once: true });

function startLove() {
    document.getElementById("start").style.display = "none";
    document.getElementById("scene").style.display = "block";
    setInterval(createHeart, 200);
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = (window.innerHeight - 20) + "px";
    heart.style.fontSize = (Math.random() * 25 + 10) + "px";

    const duration = Math.random() * 2 + 3;
    heart.style.animationDuration = duration + "s";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), duration * 1000);
}
</script>

</body>
</html>
